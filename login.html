<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 | 道序</title>
<meta name="description" content="登录道序账户，让明一在所有设备上都认识你。">
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://daoxu.com.cn/login.html">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><rect x='6' y='6' width='48' height='48' rx='2' stroke='%23C4A265' stroke-width='3' fill='none'/><path d='M14 42C18 32 24 24 32 20C38 18 44 22 40 30C36 36 28 36 26 30' stroke='%23C4A265' stroke-width='2.8' fill='none' stroke-linecap='round'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@200;300;400;500&family=Noto+Serif+SC:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{--bg:#07070A;--bg2:#0D0D10;--bg3:#131316;--tx:#F2EDE4;--tx2:#C8C0B4;--tx3:#8A8480;--tx4:#5A5652;--tx5:#3A3836;--gd:#C4A265;--gd2:#A8884E;--sf:'Noto Serif SC',serif;--ss:'Noto Sans SC',sans-serif;--e2:cubic-bezier(.33,.9,.4,1)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--tx);font-family:var(--ss);overflow-x:hidden;font-weight:300;min-height:100vh}
::selection{background:rgba(196,162,101,.2)}
a{color:inherit;text-decoration:none}

nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:20px 52px;display:flex;justify-content:space-between;align-items:center;background:rgba(7,7,10,.96);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-bottom:1px solid rgba(255,255,255,.02)}
.nl{display:flex;align-items:center;gap:16px}
.nb{font-family:var(--sf);color:var(--gd);font-size:12px;letter-spacing:4px;font-weight:400}
.nr{display:flex;gap:36px;align-items:center}
.nr a{font-size:10px;color:var(--tx4);letter-spacing:3px;transition:color .6s}
.nr a:hover{color:var(--tx)}
.nr a.active{color:var(--gd)}
.nr .nc{color:var(--gd);padding:7px 18px;border:1px solid rgba(196,162,101,.2);letter-spacing:3px;transition:all .6s}
.nr .nc:hover{background:var(--gd);color:var(--bg)}
.ham{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px}
.ham span{width:22px;height:1px;background:var(--gd);transition:all .3s}
.overlay{position:fixed;inset:0;background:rgba(7,7,10,.7);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .5s;z-index:998}
.overlay.show{opacity:1;pointer-events:auto}

.auth-shell{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:120px 24px 60px}
.auth-card{width:100%;max-width:440px;background:var(--bg);border:1px solid rgba(196,162,101,.12);padding:56px 48px;position:relative;overflow:hidden;box-shadow:inset 0 1px 0 rgba(196,162,101,.04)}
.auth-card::before{content:'';position:absolute;top:0;left:18%;right:18%;height:1px;background:linear-gradient(90deg,transparent,rgba(196,162,101,.4),transparent)}
.auth-card .lb{font-size:10px;color:var(--gd);letter-spacing:6px;display:block;text-align:center;margin-bottom:18px;opacity:.85}
.auth-card h1{font-family:var(--sf);font-size:28px;color:var(--tx);font-weight:700;letter-spacing:6px;text-align:center;margin-bottom:14px}
.auth-card .tagline{font-size:13px;color:var(--tx3);letter-spacing:1px;line-height:1.9;text-align:center;margin-bottom:36px;font-weight:300}

.field{margin-bottom:22px}
.field label{display:block;font-size:11px;color:var(--gd);letter-spacing:3px;margin-bottom:10px;font-weight:400;opacity:.85}
.field input{width:100%;background:rgba(196,162,101,.03);border:1px solid rgba(196,162,101,.12);color:var(--tx);font-family:var(--ss);font-size:14px;padding:14px 16px;letter-spacing:.5px;line-height:1.6;font-weight:300;outline:none;transition:border-color .6s,background .6s;border-radius:0}
.field input:focus{border-color:rgba(196,162,101,.45);background:rgba(196,162,101,.05)}
.field input::placeholder{color:var(--tx5);font-weight:300}

.errbox{background:rgba(180,80,80,.08);border:1px solid rgba(180,80,80,.25);color:#c98686;font-size:12px;letter-spacing:1px;padding:10px 14px;margin-bottom:18px;line-height:1.7;display:none}
.errbox.show{display:block}

.btn-primary{width:100%;padding:15px 24px;font-size:12px;letter-spacing:6px;font-family:var(--ss);font-weight:400;cursor:pointer;transition:all .6s var(--e2);border:1px solid rgba(196,162,101,.4);color:var(--gd);background:transparent;margin-top:14px}
.btn-primary:hover:not(:disabled){background:var(--gd);color:var(--bg);letter-spacing:8px}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}

.aux-links{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:24px;border-top:1px solid rgba(196,162,101,.08);font-size:11px;letter-spacing:1.5px;color:var(--tx4)}
.aux-links a{color:var(--tx3);transition:color .5s}
.aux-links a:hover{color:var(--gd)}

.mode-banner{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(196,162,101,.1);border:1px solid rgba(196,162,101,.25);color:var(--gd);font-size:10px;letter-spacing:3px;padding:6px 16px;z-index:50;backdrop-filter:blur(10px);opacity:0;transition:opacity .5s}
.mode-banner.show{opacity:1}

.page-close{position:fixed;top:86px;right:28px;width:40px;height:40px;border:1px solid rgba(255,255,255,.08);background:rgba(7,7,10,.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--tx3);cursor:pointer;font-size:22px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .4s;text-decoration:none;z-index:200;font-family:var(--ss)}
.page-close:hover{color:var(--gd);border-color:rgba(196,162,101,.35);background:rgba(7,7,10,.95)}
footer{padding:32px 64px;text-align:center;border-top:1px solid rgba(255,255,255,.03);background:var(--bg)}
footer .ft-meta{font-size:10px;color:var(--tx5);letter-spacing:2px;line-height:1.9}

@media(max-width:768px){
  nav{padding:14px 20px}
  .nr{position:fixed;top:0;right:-100%;width:70%;max-width:300px;height:100dvh;background:rgba(7,7,10,.98);backdrop-filter:blur(40px);flex-direction:column;justify-content:center;align-items:center;gap:32px;transition:right .5s var(--e2);z-index:999;border-left:1px solid rgba(196,162,101,.06)}
  .nr.open{right:0}
  .nr a{font-size:13px;letter-spacing:4px;color:var(--tx2)}
  .nr a:hover,.nr a.active{color:var(--gd)}
  .ham{display:flex !important}
  .page-close{top:72px;right:16px;width:36px;height:36px;font-size:20px}
  .auth-shell{padding:96px 16px 40px}
  .auth-card{padding:40px 26px}
  .auth-card h1{font-size:22px;letter-spacing:5px}
  footer{padding:24px 16px}
}
</style>
</head>
<body>

<nav id="nv">
  <a href="/" class="nl">
    <svg width="28" height="28" viewBox="0 0 60 60" fill="none"><rect x="6" y="6" width="48" height="48" rx="2" stroke="#C4A265" stroke-width="3"/><path d="M14 42C18 32 24 24 32 20C38 18 44 22 40 30C36 36 28 36 26 30" stroke="#C4A265" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 46C24 38 30 32 36 30" stroke="#C4A265" stroke-width="1.8" fill="none" stroke-linecap="round" opacity=".45"/></svg>
    <span class="nb">道 序 科 技</span>
  </a>
  <div class="nr">
    <a href="/">首页</a>
    <a href="/about.html">关于</a>
    <a href="/services.html">服务</a>
    <a href="/agents.html">智能体</a>
    <a href="/cases.html">案例</a>
    <a href="/thoughts.html">明一日报</a>
    <a href="/faq.html">常见问题</a>
    <a href="/#cnt">联系</a>
  </div>
  <div class="ham" onclick="toggleMenu()"><span></span><span></span><span></span></div>
</nav>
<div class="overlay" onclick="toggleMenu()"></div>

<a href="/" class="page-close" aria-label="回主页" title="回主页">×</a>

<div class="mode-banner" id="modeBanner">BETA · 体验预览</div>

<section class="auth-shell">
  <div class="auth-card">
    <span class="lb">SIGN IN · 登 录</span>
    <h1>欢 迎 回 来</h1>
    <p class="tagline">登录后，明一在所有设备都认识你 ——<br>设定、记忆、对话历史云端同步。</p>

    <form id="loginForm" autocomplete="on">
      <div class="errbox" id="errbox"></div>

      <div class="field">
        <label>用户名</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="支持中文 · 4-20 字符" required>
      </div>

      <div class="field">
        <label>密码</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="至少 8 位" required>
      </div>

      <button type="submit" class="btn-primary" id="loginBtn">登 录</button>

      <div class="aux-links">
        <a href="/register.html">还没账号？注册 →</a>
        <a href="/recover.html">忘记密码？</a>
      </div>
    </form>
  </div>
</section>

<footer>
  <div class="ft-meta">
    道序科技 · DaoXu Technology<br>
    © 2026 道序科技. 为不止于此的人而来.
  </div>
</footer>

<script src="/js/auth.js"></script>
<script>
function toggleMenu(){
  document.querySelector('.nr').classList.toggle('open');
  document.querySelector('.overlay').classList.toggle('show');
}
document.querySelectorAll('.nr a').forEach(function(a){a.addEventListener('click',function(e){
  if(window.innerWidth>768)return;
  var h=this.getAttribute('href');
  if(!h)return;
  if(h.charAt(0)==='#'||h.indexOf('/#')===0){setTimeout(toggleMenu,160);return}
  e.preventDefault();
  toggleMenu();
  setTimeout(function(){location.href=h},80);
})});

// 已登录直接跳走
if(DaoxuAuth.isLoggedIn()){
  var next = new URLSearchParams(location.search).get('next') || '/profile.html';
  location.replace(next);
}

// Mock 模式提示
if(DaoxuAuth.mode === 'mock'){
  document.getElementById('modeBanner').classList.add('show');
}

var ERR_MSG = {
  USER_NOT_FOUND: '用户名或密码错误',
  WRONG_PASSWORD: '用户名或密码错误',
  ACCOUNT_DISABLED: '账户已停用，请联系管理员',
  INVALID_REQUEST: '输入格式有误',
  NETWORK_ERROR: '网络异常，请稍后再试',
  TIMEOUT: '请求超时，请重试'
};

function showError(msg){
  var box = document.getElementById('errbox');
  box.textContent = msg;
  box.classList.add('show');
}
function clearError(){
  document.getElementById('errbox').classList.remove('show');
}

document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  clearError();
  var btn = document.getElementById('loginBtn');
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;

  if(!username || !password){ showError('请填写用户名和密码'); return }

  btn.disabled = true; btn.textContent = '登 录 中 ...';
  var r = await DaoxuAuth.login({ username: username, password: password });
  btn.disabled = false; btn.textContent = '登 录';

  if(r.ok){
    var next = new URLSearchParams(location.search).get('next') || '/profile.html';
    location.replace(next);
  }else{
    showError(ERR_MSG[r.error.code] || r.error.message || '登录失败');
  }
});
</script>

</body>
</html>
